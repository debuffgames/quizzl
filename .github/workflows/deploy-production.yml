name: Deploy to Production (Hetzner)

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_PREFIX: ghcr.io/ahessedenz

jobs:
  wait-for-build:
    name: Wait for Staging Build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy.yml to complete
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Build App Image"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          allowed-conclusions: success
          timeout: 1200

  deploy-production:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    needs: wait-for-build
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.prod.yml,docker-compose.hetzner.yml"
          target: "/opt/quizzl/"

      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/quizzl
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose \
              --env-file .env \
              -f docker-compose.prod.yml \
              -f docker-compose.hetzner.yml \
              pull
            docker compose \
              --env-file .env \
              -f docker-compose.prod.yml \
              -f docker-compose.hetzner.yml \
              up -d --remove-orphans
            docker image prune -f
            echo "Production deployment complete"
