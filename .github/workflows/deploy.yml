name: Build & Deploy (Staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ahessedenz

jobs:
  build-app:
    name: Build App Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push quizzl-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/quizzl-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-socket:
    name: Build Socket Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push quizzl-socket
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.socket
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/quizzl-socket:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-nginx:
    name: Build Nginx Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push quizzl-nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/quizzl-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging (Portainer)
    runs-on: ubuntu-latest
    needs: [build-app, build-socket, build-nginx]
    steps:
      - name: Trigger Portainer Webhook
        run: |
          curl -s -X POST "${{ vars.PORTAINER_WEBHOOK_URL_QUIZZL }}"
          echo "Portainer deployment triggered"
