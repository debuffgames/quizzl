name: Build & Deploy (Staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/debuffgames

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      socket: ${{ steps.filter.outputs.socket }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'public/**'
              - 'prisma/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile.app'
              - 'docker-entrypoint.sh'
              - '.github/workflows/deploy.yml'
            socket:
              - 'server/**'
              - 'src/lib/**'
              - 'prisma/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile.socket'
              - '.github/workflows/deploy.yml'
            nginx:
              - 'nginx.conf'
              - 'Dockerfile.nginx'
              - '.github/workflows/deploy.yml'

  build-app:
    name: Build App Image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push quizzl-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/quizzl-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-socket:
    name: Build Socket Image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.socket == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push quizzl-socket
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.socket
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/quizzl-socket:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-nginx:
    name: Build Nginx Image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.nginx == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push quizzl-nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/quizzl-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging (Portainer)
    runs-on: ubuntu-latest
    needs: [build-app, build-socket, build-nginx]
    # Run even if some build jobs were skipped (= no relevant changes), but not if one failed
    if: ${{ !failure() && !cancelled() }}
    steps:
      - name: Trigger Portainer Webhook
        run: |
          curl -s -X POST "${{ vars.PORTAINER_WEBHOOK_URL_QUIZZL }}"
          echo "Portainer deployment triggered"
